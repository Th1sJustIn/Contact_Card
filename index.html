<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin Marshall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FBFBF9;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --border: rgba(0,0,0,0.07);
      --card-bg: rgba(0,0,0,0.025);
      --accent: #3b82f6;
      --dark: #222;
      --radius-card: 14px;
      --radius-pill: 100px;
      --ease: cubic-bezier(.16,1,.3,1);
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.035) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 32px;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.7s var(--ease) 0.05s forwards;
    }

    .photo-frame {
      width: 148px;
      height: 148px;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
      margin-bottom: 10px;
    }

    .name {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 46px;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .role {
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .school {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 10px;
      background: rgba(0,0,0,0.055);
      border-radius: 5px;
      color: var(--text);
      white-space: nowrap;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 24px;
      opacity: 0;
      animation: rise 0.5s var(--ease) 0.25s forwards;
    }

    /* ── Contact Grid ── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .contact-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 18px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      text-decoration: none;
      color: var(--text);
      transition: all 0.35s var(--ease);
      opacity: 0;
      transform: translateY(12px);
      cursor: pointer;
    }

    .contact-item:nth-child(1) { animation: rise 0.55s var(--ease) 0.3s forwards; }
    .contact-item:nth-child(2) { animation: rise 0.55s var(--ease) 0.38s forwards; }
    .contact-item:nth-child(3) { animation: rise 0.55s var(--ease) 0.46s forwards; }
    .contact-item:nth-child(4) { animation: rise 0.55s var(--ease) 0.54s forwards; }

    .contact-item:hover {
      background: #fff;
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(59,130,246,0.1), 0 2px 8px rgba(0,0,0,0.06);
    }

    .contact-item:hover .contact-icon {
      color: var(--accent);
    }

    .contact-item:hover .contact-label {
      color: var(--accent);
    }

    .contact-icon {
      color: var(--text);
      opacity: 0.7;
      transition: color 0.3s var(--ease), opacity 0.3s var(--ease);
      flex-shrink: 0;
    }

    .contact-item:hover .contact-icon {
      opacity: 1;
    }

    .contact-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      transition: color 0.3s var(--ease);
      line-height: 1.2;
    }

    .contact-sub {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.8;
      line-height: 1.3;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .contact-item:active {
      background: #fff;
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(59,130,246,0.1);
    }

    .contact-item:active .contact-icon,
    .contact-item:active .contact-label {
      color: var(--accent);
      opacity: 1;
    }

    /* ── Save Button ── */
    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 28px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.35s var(--ease);
      margin-top: 14px;
      opacity: 0;
      animation: rise 0.55s var(--ease) 0.65s forwards;
      letter-spacing: 0.01em;
    }

    .save-btn:hover {
      background: #111;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .save-btn:active {
      transform: scale(0.98);
      box-shadow: none;
      background: #111;
    }

    /* ── Footer ── */
    .footer-note {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      opacity: 0.4;
      margin-top: 28px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      animation: rise 0.5s var(--ease) 0.75s forwards;
    }

    /* ── Animation ── */
    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 380px) {
      .name { font-size: 38px; }
      .contact-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .contact-item { padding: 14px 12px; }
    }
  </style>
</head>
